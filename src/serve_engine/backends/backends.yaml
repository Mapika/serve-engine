# Pinned engine images. Update via `serve update-engines` (Plan 08) or
# `serve config set engine.<name>.image <tag>`.

vllm:
  image: vllm/vllm-openai
  pinned_tag: v0.20.2
  health_path: /health
  openai_base: /v1
  metrics_path: /metrics
  internal_port: 8000
  headroom:
    # Effective gpu_memory_utilization = max(estimate * factor,
    # estimate + min_extra_mb, per_gpu_mb * min_floor_pct/100).
    # Constants tuned for vLLM 0.20.x; revisit if upgrading.
    factor: 1.5
    min_extra_mb: 2048
    min_floor_pct: 15

sglang:
  image: lmsysorg/sglang
  pinned_tag: v0.5.11
  health_path: /health
  openai_base: /v1
  metrics_path: /metrics
  internal_port: 30000
  headroom:
    # SGLang's mem-fraction-static is less forgiving on small models;
    # bump the floor a bit relative to vLLM. Empirical.
    factor: 1.6
    min_extra_mb: 2048
    min_floor_pct: 20
  # Version-pinned workarounds. When bumping pinned_tag, revisit and drop
  # any flag that is no longer needed.
  extra_launch_args:
    # v0.5.11 piecewise CUDA graph compilation hits CUBLAS_STATUS_EXECUTION_FAILED
    # on small models. Falls back to regular CUDA graphs (still fast).
    # Drop this flag once SGLang ships a fix.
    - --disable-piecewise-cuda-graph

trtllm:
  # NVIDIA's OpenAI-compatible TensorRT-LLM server (PyTorch backend; the
  # TensorRT-engine path requires a separate ahead-of-time build step).
  # Tag tracks https://github.com/NVIDIA/TensorRT-LLM/releases (active RC line).
  # NGC strips the `v` prefix from github release names (github "v1.3.0rc14"
  # -> NGC tag "1.3.0rc14"). Pull is anonymous; no NGC account required.
  # Bump via `serve update-engines` when the github release line moves.
  image: nvcr.io/nvidia/tensorrt-llm/release
  pinned_tag: "1.3.0rc14"
  health_path: /health
  openai_base: /v1
  metrics_path: /metrics
  internal_port: 8000
  headroom:
    # TRT-LLM's --kv_cache_free_gpu_memory_fraction is the analogue of
    # vLLM's --gpu-memory-utilization. Use vLLM-style headroom.
    factor: 1.5
    min_extra_mb: 2048
    min_floor_pct: 15
